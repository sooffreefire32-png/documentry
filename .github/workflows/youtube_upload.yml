name: YouTube Video Uploader

on:
  workflow_run:
    workflows: ["AI Documentary Automation Pipeline"]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  upload:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' || github.event_name == 'workflow_dispatch' }}

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt
        pip install google-api-python-client google-auth-oauthlib google-auth-httplib2

    - name: Download video artifact
      uses: actions/download-artifact@v4
      with:
        name: final-documentary-video
        path: output/
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Download SEO data artifact
      uses: actions/download-artifact@v4
      with:
        name: pipeline-reports
        path: output/
        run-id: ${{ github.event.workflow_run.id }}
        github-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Load SEO data
      id: seo_data
      run: |
        SEO_DATA=$(cat output/youtube_seo_data.json)
        echo "title=$(echo $SEO_DATA | jq -r '.title')" >> $GITHUB_OUTPUT
        echo "description=$(echo $SEO_DATA | jq -r '.description')" >> $GITHUB_OUTPUT
        echo "tags=$(echo $SEO_DATA | jq -r '.tags')" >> $GITHUB_OUTPUT
        echo "scheduled_publish_at=$(echo $SEO_DATA | jq -r '.scheduled_publish_at')" >> $GITHUB_OUTPUT

    - name: Run YouTube Uploader
      env:
        YOUTUBE_CLIENT_ID: ${{ secrets.YOUTUBE_CLIENT_ID }}
        YOUTUBE_CLIENT_SECRET: ${{ secrets.YOUTUBE_CLIENT_SECRET }}
        YOUTUBE_REFRESH_TOKEN: ${{ secrets.YOUTUBE_REFRESH_TOKEN }}
        YOUTUBE_VIDEO_PATH: output/final_video.mp4
        YOUTUBE_TITLE: ${{ steps.seo_data.outputs.title }}
        YOUTUBE_DESCRIPTION: ${{ steps.seo_data.outputs.description }}
        YOUTUBE_TAGS: ${{ steps.seo_data.outputs.tags }}
        YOUTUBE_THUMBNAIL_PATH: assets/thumbnail.jpg # Ensure you place your thumbnail here
        YOUTUBE_SCHEDULED_PUBLISH_AT: ${{ steps.seo_data.outputs.scheduled_publish_at }}
      run: python youtube_uploader.py
